<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | Qoyla Restaurant</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
  <link href="../assets/css/style.css" rel="stylesheet">
</head>
<body>

<div class="auth-page">
  <div class="auth-card" data-aos="zoom-in">

    <!-- Logo -->
    <div class="auth-logo">QOYLA</div>
    <p class="auth-sub">Welcome back — log in to your loyalty account</p>

    <!-- NOTE FOR BACKEND: show this div when PHP sets $loginError -->
    <!-- <div class="flash flash-error"><i class="fas fa-exclamation-circle"></i> Invalid phone or password.</div> -->

    <!-- NOTE FOR BACKEND: show this div when redirected with ?registered=1 -->
    <!-- <div class="flash flash-success"><i class="fas fa-check-circle"></i> Account created! Please log in.</div> -->

    <form method="POST" action="" data-loading>
      <div class="form-group">
        <label class="form-label">Phone Number or Username</label>
        <input type="text" name="identifier" class="form-input"
               placeholder="03XX XXXXXXX" required
               autocomplete="username">
      </div>

      <div class="form-group">
        <label class="form-label">Password</label>
        <div style="position:relative;">
          <input type="password" name="password" id="passwordField" class="form-input"
                 placeholder="••••••••" required
                 autocomplete="current-password"
                 style="padding-right:3rem;">
          <button type="button"
                  onclick="togglePassword('passwordField','eyeIcon')"
                  style="position:absolute;right:1rem;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--text-muted);cursor:pointer;padding:0;line-height:1;">
            <i class="fas fa-eye" id="eyeIcon"></i>
          </button>
        </div>
      </div>

      <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:1.5rem;">
        <label style="display:flex; align-items:center; gap:0.5rem; cursor:pointer; font-size:0.88rem; color:var(--text-muted);">
          <input type="checkbox" name="remember" style="accent-color:var(--flame-orange); width:15px; height:15px;">
          Remember me
        </label>
        <a href="#" style="font-size:0.85rem; color:var(--flame-orange); font-weight:700;">Forgot password?</a>
      </div>

      <button type="submit" class="btn-qoyla" style="width:100%; justify-content:center; font-size:0.92rem;">
        Log In <i class="fas fa-arrow-right"></i>
      </button>
    </form>

    <div class="auth-divider"><span>or</span></div>

    <p style="text-align:center; font-size:0.9rem; color:var(--text-muted);">
      New to Qoyla?
      <a href="signup.html" style="color:var(--flame-orange); font-weight:700; margin-left:4px;">Create a free account</a>
    </p>

    <div style="text-align:center; margin-top:1.5rem;">
      <a href="../index.html" style="font-size:0.82rem; color:var(--text-muted);">
        <i class="fas fa-arrow-left" style="margin-right:5px;"></i> Back to Restaurant
      </a>
    </div>

  </div>
</div>

<script src="../assets/js/main.js"></script>
</body>
</html>
